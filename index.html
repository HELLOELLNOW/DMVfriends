<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMV Friends</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ── THEMES ── */
[data-theme="dark"]{
  --bg:#0D1210;--bg2:#131A16;--bg3:#1C2620;--bg4:#243029;
  --card:#181F1B;--border:rgba(0,201,127,0.13);--border2:rgba(255,255,255,0.07);
  --text:#EEF9F4;--text2:#7FA990;--text3:#3D6050;
  --input:#1C2620;--nav:#131A16;--top:#0D1210;
  --shadow:rgba(0,0,0,0.55);--sh2:rgba(0,0,0,0.3);
  --chat-in:#243029;--tog:#1C2620;--bg3t:rgba(28,38,32,0.9);
}
[data-theme="light"]{
  --bg:#F4FBF7;--bg2:#FFFFFF;--bg3:#E8F5EE;--bg4:#D4EDE0;
  --card:#FFFFFF;--border:rgba(0,160,100,0.16);--border2:rgba(0,0,0,0.07);
  --text:#0A2018;--text2:#2E7050;--text3:#7EB89A;
  --input:#F0FAF5;--nav:#FFFFFF;--top:#FFFFFF;
  --shadow:rgba(0,80,40,0.1);--sh2:rgba(0,80,40,0.07);
  --chat-in:#E8F5EE;--tog:#D4EDE0;--bg3t:rgba(232,245,238,0.92);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);transition:background 0.3s;}
body{font-family:'DM Sans',sans-serif;color:var(--text);overflow-x:hidden;}
.app{max-width:700px;margin:0 auto;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{background:var(--top);border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60;transition:background 0.3s,border 0.3s;backdrop-filter:blur(12px);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-logo{width:36px;height:36px;background:linear-gradient(135deg,#00C97F,#007A4D);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 16px rgba(0,201,127,0.3);}
.brand-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;background:linear-gradient(90deg,#00C97F,#40E0A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.3px;}
.brand-tag{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-top:1px;}
.top-right{display:flex;align-items:center;gap:8px;}
.theme-sw{display:flex;background:var(--tog);border-radius:999px;padding:3px;gap:2px;border:1px solid var(--border);}
.tsw{width:28px;height:24px;border-radius:999px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.2s;}
.tsw.on{background:linear-gradient(135deg,#00C97F,#00A86B);}
.tsw.on i{color:#fff;}
[data-theme="dark"] .tsw.on i{color:#000;}
.tsw:not(.on) i{color:var(--text3);}
.nbtn{position:relative;width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.nbtn i{font-size:14px;color:var(--text2);}
.npip{position:absolute;top:-1px;right:-1px;width:9px;height:9px;background:#F5A623;border-radius:50%;border:2px solid var(--top);display:none;animation:pip 2s infinite;}
@keyframes pip{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
.adav{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#00C97F,#007A4D);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;border:2px solid rgba(0,201,127,0.25);}

/* ── NAV ── */
.nav{display:flex;background:var(--nav);border-bottom:1px solid var(--border);transition:background 0.3s;}
.nb{flex:1;padding:12px 4px 10px;font-size:10px;border:none;background:transparent;cursor:pointer;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:4px;letter-spacing:0.05em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all 0.2s;position:relative;font-family:'DM Sans',sans-serif;font-weight:500;}
.nb i{font-size:15px;transition:transform 0.2s;}
.nb.on{color:#00C97F;border-bottom-color:#00C97F;}
.nb.on i{transform:translateY(-1px);}
.nbadge{position:absolute;top:8px;right:calc(50% - 18px);background:#F5A623;color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:999px;display:none;}

/* ── SCREENS ── */
.screen{display:none;animation:fu 0.25s ease;}
.screen.on{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── HERO ── */
.hero{position:relative;height:260px;overflow:hidden;}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.15) 0%,rgba(0,0,0,0.75) 100%);}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:20px 20px 24px;}
.hero-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(0,201,127,0.25);border:1px solid rgba(0,201,127,0.5);color:#00C97F;font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px;backdrop-filter:blur(6px);}
.hero-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;line-height:1.15;letter-spacing:-0.5px;margin-bottom:10px;text-shadow:0 2px 12px rgba(0,0,0,0.4);}
.hero-stats{display:flex;gap:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(10px);border-radius:12px;border:1px solid rgba(255,255,255,0.12);overflow:hidden;display:inline-flex;}
.hstat{padding:10px 18px;text-align:center;}
.hstat+.hstat{border-left:1px solid rgba(255,255,255,0.1);}
.hstat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;}
.hstat-lbl{font-size:9px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.08em;margin-top:1px;}

/* ── SECTION LABEL ── */
.slbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.slbl-line{flex:1;height:1px;background:var(--border);margin-left:10px;}

/* ── EVENT CARD (photo cover style) ── */
.ev-card{background:var(--card);border:1px solid var(--border);border-radius:18px;margin-bottom:16px;overflow:hidden;cursor:pointer;transition:transform 0.22s,box-shadow 0.22s,border-color 0.22s;}
.ev-card:hover{transform:translateY(-3px);box-shadow:0 14px 40px var(--sh2);border-color:rgba(0,201,127,0.3);}
.ev-cover{height:170px;position:relative;overflow:hidden;}
.ev-cover-img{width:100%;height:100%;object-fit:cover;object-position:center;transition:transform 0.4s;}
.ev-card:hover .ev-cover-img{transform:scale(1.04);}
.ev-cover-fallback{position:absolute;inset:0;}
.ev-cover-grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 25%,rgba(0,0,0,0.78) 100%);}
.ev-cover-top{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:flex-start;}
.ev-cover-bot{position:absolute;bottom:12px;left:14px;right:14px;}
.ev-cover-date{color:rgba(255,255,255,0.9);font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;}
.ev-body{padding:14px 16px 16px;}
.ev-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:5px;letter-spacing:-0.2px;line-height:1.3;}
.ev-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:12px;}
.ev-footer{display:flex;align-items:center;justify-content:space-between;}
.av-stack{display:flex;align-items:center;}
.av-sm{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--card);margin-left:-8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:9px;font-weight:700;flex-shrink:0;}
.av-sm:first-child{margin-left:0;}
.av-count{font-size:12px;color:var(--text2);margin-left:8px;}
.ev-pills{display:flex;gap:5px;}

/* ── PILLS / BADGES ── */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:0.04em;}
.p-green{background:rgba(0,201,127,0.18);color:#00C97F;border:1px solid rgba(0,201,127,0.28);}
.p-amber{background:rgba(245,166,35,0.15);color:#F5A623;border:1px solid rgba(245,166,35,0.28);}
.p-red{background:rgba(255,90,90,0.15);color:#FF5A5A;border:1px solid rgba(255,90,90,0.2);}
.p-gray{background:rgba(100,100,100,0.12);color:var(--text3);border:1px solid var(--border2);}
.p-blue{background:rgba(74,158,255,0.15);color:#4A9EFF;border:1px solid rgba(74,158,255,0.25);}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:7px;justify-content:center;}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-p{background:linear-gradient(135deg,#00C97F,#00A86B);color:#fff;}
[data-theme="dark"] .btn-p{color:#000;}
.btn-s{background:var(--bg4);color:var(--text);border:1px solid var(--border2);}
.btn-d{background:rgba(255,90,90,0.1);color:#FF5A5A;border:1px solid rgba(255,90,90,0.2);}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px;}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:7px;}
.btn-block{width:100%;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.btn-glow{box-shadow:0 0 18px rgba(0,201,127,0.28);}
.btn-glow:hover{box-shadow:0 0 30px rgba(0,201,127,0.45);}

/* ── FORMS ── */
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.06em;}
.fg input,.fg textarea{width:100%;font-size:13px;font-family:'DM Sans',sans-serif;border-radius:10px;padding:9px 13px;border:1px solid var(--border);background:var(--input);color:var(--text);outline:none;transition:border 0.2s,box-shadow 0.2s;}
.fg input:focus,.fg textarea:focus{border-color:#00C97F;box-shadow:0 0 0 3px rgba(0,201,127,0.12);}
.fg textarea{min-height:72px;resize:vertical;}

/* ── MODALS ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:none;align-items:center;justify-content:center;padding:20px;z-index:200;backdrop-filter:blur(6px);}
.moverlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:440px;animation:mpop 0.28s cubic-bezier(0.34,1.56,0.64,1);transition:background 0.3s;}
@keyframes mpop{from{opacity:0;transform:scale(0.93);}to{opacity:1;transform:scale(1);}}
.modal-hd{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:18px;color:var(--text);display:flex;align-items:center;gap:9px;}
.modal-hd i{color:#00C97F;}
.mclose{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;}

/* ── MISC ── */
.pad{padding:18px;}
.empty{text-align:center;padding:40px 16px;color:var(--text3);}
.empty i{font-size:30px;display:block;margin-bottom:10px;opacity:0.25;}
.empty p{font-size:13px;line-height:1.6;}
.divider{border:none;border-top:1px solid var(--border2);margin:14px 0;}
.pend-bar{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25);border-radius:12px;padding:11px 15px;margin-bottom:16px;display:flex;align-items:center;gap:9px;font-size:13px;color:#F5A623;cursor:pointer;transition:background 0.2s;}
.pend-bar:hover{background:rgba(245,166,35,0.17);}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;border-radius:12px;overflow:hidden;}
.ptile{aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.ptile img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s;}
.ptile:hover img{transform:scale(1.06);}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;color:var(--text2);font-size:13px;margin-top:10px;transition:all 0.2s;}
.upload-zone:hover{border-color:#00C97F;color:#00C97F;background:rgba(0,201,127,0.04);}
.upload-zone i{font-size:26px;display:block;margin-bottom:7px;color:#00C97F;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 20px;font-size:13px;color:var(--text);z-index:300;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;backdrop-filter:blur(14px);box-shadow:0 16px 48px var(--shadow);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast i{margin-right:7px;color:#00C97F;}
.mrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border2);}
.mrow:last-child{border-bottom:none;}
.mav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;flex-shrink:0;border:2px solid transparent;}
.minfo{flex:1;}
.mname{font-size:14px;font-weight:500;color:var(--text);}
.msub{font-size:11px;color:var(--text3);margin-top:1px;}
.trow{display:flex;gap:4px;background:var(--bg3);border-radius:12px;padding:4px;transition:background 0.3s;}
.tpill{flex:1;font-size:12px;font-weight:500;padding:7px 10px;border-radius:9px;border:none;background:transparent;cursor:pointer;color:var(--text3);transition:all 0.2s;text-align:center;font-family:'DM Sans',sans-serif;}
.tpill.on{background:var(--card);color:var(--text);box-shadow:0 2px 8px var(--shadow);}
.vi{margin-bottom:13px;}
.vh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.vn{color:var(--text);font-weight:500;font-size:13px;}
.vc{color:var(--text3);font-size:12px;}
.vbg{height:9px;background:var(--bg3);border-radius:999px;overflow:hidden;}
.vb{height:9px;border-radius:999px;background:linear-gradient(90deg,#00C97F,#00A86B);transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);}
.cmsgs{display:flex;flex-direction:column;gap:11px;margin-bottom:14px;max-height:260px;overflow-y:auto;padding-right:4px;}
.cmsgs::-webkit-scrollbar{width:3px;}
.cmsgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px;}
.cmr{display:flex;gap:9px;align-items:flex-end;}
.cmav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;font-family:'Syne',sans-serif;}
.bbl{max-width:76%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.5;}
.bbl-in{background:var(--chat-in);color:var(--text);border-bottom-left-radius:4px;}
.bbl-out{background:linear-gradient(135deg,#00C97F,#00A86B);color:#fff;font-weight:500;border-bottom-right-radius:4px;}
[data-theme="dark"] .bbl-out{color:#000;}
.bmeta{font-size:10px;color:var(--text3);margin-top:3px;}
.ci-row{display:flex;gap:8px;align-items:center;}
.ci{flex:1;background:var(--input);border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border 0.2s;}
.ci:focus{border-color:#00C97F;}
.cs{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#00C97F,#00A86B);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:transform 0.2s;flex-shrink:0;}
[data-theme="dark"] .cs{color:#000;}
.cs:hover{transform:scale(1.06);}
.sbox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;transition:background 0.3s;}
.ac0{background:rgba(0,201,127,0.2);color:#00C97F;border-color:rgba(0,201,127,0.3);}
.ac1{background:rgba(74,158,255,0.2);color:#4A9EFF;border-color:rgba(74,158,255,0.3);}
.ac2{background:rgba(255,90,90,0.2);color:#FF5A5A;border-color:rgba(255,90,90,0.3);}
.ac3{background:rgba(245,166,35,0.2);color:#F5A623;border-color:rgba(245,166,35,0.3);}
.ac4{background:rgba(167,139,250,0.2);color:#A78BFA;border-color:rgba(167,139,250,0.3);}

/* ── PHOTO MOSAIC (home) ── */
.mosaic{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:130px 130px;gap:6px;margin-bottom:6px;}
.mosaic-big{grid-column:1/3;grid-row:1/3;border-radius:14px;overflow:hidden;}
.mosaic-sm{border-radius:10px;overflow:hidden;}
.mosaic img{width:100%;height:100%;object-fit:cover;transition:transform 0.35s;}
.mosaic img:hover{transform:scale(1.04);}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">🌿</div>
      <div>
        <div class="brand-name">DMV Friends</div>
        <div class="brand-tag">DC · MD · VA</div>
      </div>
    </div>
    <div class="top-right">
      <div class="theme-sw">
        <button class="tsw on" id="btn-dark" onclick="setTheme('dark')" title="Dark"><i class="fa-solid fa-moon"></i></button>
        <button class="tsw" id="btn-light" onclick="setTheme('light')" title="Light"><i class="fa-solid fa-sun"></i></button>
      </div>
      <div class="nbtn" onclick="showScreen('admin')">
        <i class="fa-regular fa-bell"></i>
        <div class="npip" id="notif-pip"></div>
      </div>
      <div class="adav">AD</div>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="nb on" id="nav-home" onclick="showScreen('home')"><i class="fa-solid fa-house"></i>Home<span class="nbadge" id="nb-home"></span></button>
    <button class="nb" id="nav-events" onclick="showScreen('events')"><i class="fa-solid fa-calendar-days"></i>Events</button>
    <button class="nb" id="nav-members" onclick="showScreen('members')"><i class="fa-solid fa-users"></i>Members</button>
    <button class="nb" id="nav-admin" onclick="showScreen('admin')"><i class="fa-solid fa-shield-halved"></i>Admin<span class="nbadge" id="nb-admin"></span></button>
  </div>

  <div id="toast" class="toast"></div>

  <!-- ═══ HOME ═══ -->
  <div id="screen-home" class="screen on">
    <!-- Hero with real photo -->
    <div class="hero">
      <img class="hero-img" src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=900&q=80&fit=crop&crop=faces,center" alt="Friends hanging out" loading="eager">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-chip"><i class="fa-solid fa-location-dot" style="font-size:9px;"></i>Your crew · Reston, VA</div>
        <div class="hero-title">Good vibes,<br>great people 🌿</div>
        <div class="hero-stats">
          <div class="hstat"><div class="hstat-val" id="hs-m">0</div><div class="hstat-lbl">Members</div></div>
          <div class="hstat"><div class="hstat-val" id="hs-e">0</div><div class="hstat-lbl">Events</div></div>
          <div class="hstat"><div class="hstat-val" id="hs-p">0</div><div class="hstat-lbl">Photos</div></div>
        </div>
      </div>
    </div>

    <div class="pad">
      <div id="pend-bar-home"></div>

      <div class="slbl">Upcoming events <div class="slbl-line"></div></div>
      <div id="home-evs"></div>

      <!-- Photo mosaic with real friend photos -->
      <div class="slbl" style="margin-top:20px;">Memories 📸 <div class="slbl-line"></div></div>
      <div class="mosaic" id="home-mosaic">
        <div class="mosaic-big"><img src="https://images.unsplash.com/photo-1543807535-eceef0bc6599?w=600&q=80&fit=crop&crop=faces" alt="Friends gathering" loading="lazy"></div>
        <div class="mosaic-sm"><img src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=300&q=80&fit=crop&crop=top" alt="Friends outdoors" loading="lazy"></div>
        <div class="mosaic-sm"><img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=300&q=80&fit=crop" alt="Group together" loading="lazy"></div>
      </div>
      <div style="font-size:11px;color:var(--text3);text-align:right;margin-top:4px;margin-bottom:4px;">Photos from your meetups will appear here</div>
    </div>
  </div>

  <!-- ═══ EVENTS ═══ -->
  <div id="screen-events" class="screen">
    <div class="pad">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div class="trow" style="flex:1;margin-right:10px;">
          <button class="tpill on" onclick="filterEvs('upcoming',this)">Upcoming</button>
          <button class="tpill" onclick="filterEvs('past',this)">Past</button>
        </div>
        <button class="btn btn-p btn-sm btn-glow" onclick="openM('m-create')"><i class="fa-solid fa-plus"></i>New</button>
      </div>
      <div id="events-list"></div>
    </div>
  </div>

  <!-- ═══ MEMBERS ═══ -->
  <div id="screen-members" class="screen">
    <div class="pad">
      <!-- Members hero photo -->
      <div style="height:140px;border-radius:16px;overflow:hidden;margin-bottom:18px;position:relative;">
        <img src="https://images.unsplash.com/photo-1566516249634-a5f47e5e1b6e?w=700&q=80&fit=crop&crop=faces,center" alt="Group of friends" style="width:100%;height:100%;object-fit:cover;object-position:center 30%;" loading="lazy">
        <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,0.7) 100%);display:flex;align-items:flex-end;padding:14px 16px;">
          <div>
            <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;">The Crew</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.75);margin-top:2px;"><span id="crew-count">0</span> approved members</div>
          </div>
          <button class="btn btn-p btn-sm" style="margin-left:auto;" onclick="openM('m-join')"><i class="fa-solid fa-user-plus"></i>Request</button>
        </div>
      </div>
      <div id="members-list"></div>
    </div>
  </div>

  <!-- ═══ ADMIN ═══ -->
  <div id="screen-admin" class="screen">
    <div class="pad">
      <div class="slbl">Pending requests <div class="slbl-line"></div></div>
      <div id="pending-list"></div>
      <div class="divider"></div>
      <div class="slbl">Manage events <div class="slbl-line"></div></div>
      <div id="admin-events"></div>
    </div>
  </div>

  <!-- ═══ EVENT DETAIL ═══ -->
  <div id="screen-event-detail" class="screen">
    <div id="ev-detail"></div>
  </div>
</div>

<!-- MODAL: Create Event -->
<div class="moverlay" id="m-create">
  <div class="modal">
    <div class="modal-hd"><i class="fa-solid fa-calendar-plus"></i>New event<button class="mclose" onclick="closeM('m-create')"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="fg"><label>Event name *</label><input type="text" id="ev-name" placeholder="e.g. Summer cookout"></div>
    <div class="fg"><label>Date & time *</label><input type="datetime-local" id="ev-date"></div>
    <div class="fg"><label>Location</label><input type="text" id="ev-loc" placeholder="e.g. Reston Town Center"></div>
    <div class="fg"><label>Description</label><textarea id="ev-desc" placeholder="What's the plan?"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-p btn-glow" style="flex:1;" onclick="createEvent()"><i class="fa-solid fa-check"></i>Create</button>
      <button class="btn btn-s" onclick="closeM('m-create')">Cancel</button>
    </div>
  </div>
</div>

<!-- MODAL: Join -->
<div class="moverlay" id="m-join">
  <div class="modal">
    <div class="modal-hd"><i class="fa-solid fa-user-plus"></i>Request to join<button class="mclose" onclick="closeM('m-join')"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="fg"><label>Your name *</label><input type="text" id="jn-name" placeholder="Full name"></div>
    <div class="fg"><label>Your email *</label><input type="email" id="jn-email" placeholder="you@email.com"></div>
    <div class="fg"><label>Why do you want to join?</label><textarea id="jn-reason" placeholder="Tell us about yourself..."></textarea></div>
    <div class="btn-row">
      <button class="btn btn-p btn-glow" style="flex:1;" onclick="submitJoin()"><i class="fa-solid fa-paper-plane"></i>Submit</button>
      <button class="btn btn-s" onclick="closeM('m-join')">Cancel</button>
    </div>
  </div>
</div>

<!-- MODAL: Add Venue -->
<div class="moverlay" id="m-venue">
  <div class="modal">
    <div class="modal-hd"><i class="fa-solid fa-location-dot"></i>Suggest a venue<button class="mclose" onclick="closeM('m-venue')"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="fg"><label>Venue name *</label><input type="text" id="vn-name" placeholder="e.g. Alamo Drafthouse"></div>
    <div class="fg"><label>Address / area</label><input type="text" id="vn-addr" placeholder="e.g. Woodbridge, VA"></div>
    <div class="btn-row">
      <button class="btn btn-p btn-glow" style="flex:1;" onclick="addVenue()"><i class="fa-solid fa-plus"></i>Add</button>
      <button class="btn btn-s" onclick="closeM('m-venue')">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── Real Unsplash event cover photos (free to use) ──
const COVERS = [
  'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=700&q=80&fit=crop&crop=faces,center',   // friends gathering outdoors
  'https://images.unsplash.com/photo-1543807535-eceef0bc6599?w=700&q=80&fit=crop&crop=center',             // friends laughing together
  'https://images.unsplash.com/photo-1506869640319-fe1a24fd76dc?w=700&q=80&fit=crop&crop=top',             // group celebration
  'https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=700&q=80&fit=crop',                     // night out friends
  'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=700&q=80&fit=crop',                     // team together
  'https://images.unsplash.com/photo-1566516249634-a5f47e5e1b6e?w=700&q=80&fit=crop&crop=faces',          // diverse friend group
];

// ── Theme ──
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('dmvf-theme',t);
  document.getElementById('btn-dark').classList.toggle('on',t==='dark');
  document.getElementById('btn-light').classList.toggle('on',t==='light');
}
(()=>setTheme(localStorage.getItem('dmvf-theme')||'dark'))();

// ── State ──
const KEY='dmvfriends_v6';
let S={members:[],events:[],requests:[],nid:100};
let evFilter='upcoming', curEvId=null;

function load(){
  try{const r=localStorage.getItem(KEY);if(r)S=JSON.parse(r);}catch(e){}
  if(!S.members||!S.members.length)seed();
  render();
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}

function seed(){
  S.members=[
    {id:1,name:'Marcus Johnson',email:'marcus@dmv.com',c:0,joined:Date.now()-864e5*10},
    {id:2,name:'Tiana Rivers',  email:'tiana@dmv.com', c:1,joined:Date.now()-864e5*8},
    {id:3,name:'Amir Saleh',    email:'amir@dmv.com',  c:2,joined:Date.now()-864e5*5},
    {id:4,name:'Keisha Brown',  email:'keisha@dmv.com',c:3,joined:Date.now()-864e5*3},
  ];
  S.events=[
    {id:1,name:'Saturday Cookout',date:'2026-05-17T15:00',location:'Reston Town Center',
     desc:'Annual summer cookout! 🔥 Bring something to grill and good vibes.',
     rsvps:[1,2,3,4],photos:[],cov:0,
     venues:[{id:1,name:'Reston Town Center Park',addr:'Reston, VA',votes:[1,2,3,4]},{id:2,name:'Lake Anne Plaza',addr:'Reston, VA',votes:[1,2]}],
     chat:[{id:1,mid:1,name:'Marcus',text:"Who's bringing the speaker? 🔊",t:Date.now()-3600000},
           {id:2,mid:2,name:'Tiana', text:'I got it! Also bringing extra chairs 🪑',t:Date.now()-1800000},
           {id:3,mid:4,name:'Keisha',text:"Can't wait!! I'll bring the potato salad 😍",t:Date.now()-900000}]},
    {id:2,name:'Movie Night',date:'2026-05-24T19:00',location:'TBD — vote below!',
     desc:'Blockbuster night out with dinner included 🎬🍿',
     rsvps:[1,2,3],photos:[],cov:1,
     venues:[{id:1,name:'Alamo Drafthouse',addr:'Woodbridge, VA',votes:[1,2,3]},{id:2,name:'AMC Tysons Corner',addr:'McLean, VA',votes:[1,2]},{id:3,name:'iPic Theaters',addr:'North Bethesda, MD',votes:[]}],
     chat:[]},
    {id:3,name:'Hiking at Great Falls',date:'2026-06-07T09:00',location:'Great Falls, MD',
     desc:'Morning hike with the crew! Bring water, snacks, and good shoes 🥾🌲',
     rsvps:[1,3,4],photos:[],cov:4,venues:[],chat:[]},
  ];
  S.requests=[];S.nid=300;save();
}

function uid(){return++S.nid;}
function ini(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fmtD(iso){if(!iso)return'TBD';const d=new Date(iso);return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function fmtShort(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtT(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function past(iso){return new Date(iso)<new Date();}
function gm(id){return S.members.find(m=>m.id===id);}

let toastTmr;
function toast(msg,icon='check'){
  const t=document.getElementById('toast');
  t.innerHTML=`<i class="fa-solid fa-${icon}"></i>${msg}`;
  t.classList.add('show');clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),3000);
}
function openM(id){const e=document.getElementById(id);e.style.display='flex';setTimeout(()=>e.classList.add('open'),10);}
function closeM(id){const e=document.getElementById(id);e.classList.remove('open');setTimeout(()=>e.style.display='none',250);}

function showScreen(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const s=document.getElementById('screen-'+n);if(s)s.classList.add('on');
  const nb=document.getElementById('nav-'+n);if(nb)nb.classList.add('on');
  render();
}

function render(){
  renderHero();renderBadges();renderPendBar();
  renderHomeEvs();
  renderEvList();renderMembers();renderAdmin();
  document.getElementById('crew-count').textContent=S.members.length;
}
function renderHero(){
  document.getElementById('hs-m').textContent=S.members.length;
  document.getElementById('hs-e').textContent=S.events.filter(e=>!past(e.date)).length;
  document.getElementById('hs-p').textContent=S.events.reduce((a,e)=>a+(e.photos?e.photos.length:0),0);
}
function renderBadges(){
  const n=S.requests.filter(r=>r.status==='pending').length;
  const nb=document.getElementById('nb-admin');
  nb.style.display=n>0?'':'none';nb.textContent=n;
  document.getElementById('notif-pip').style.display=n>0?'':'none';
}
function renderPendBar(){
  const el=document.getElementById('pend-bar-home');if(!el)return;
  const n=S.requests.filter(r=>r.status==='pending').length;
  el.innerHTML=n>0?`<div class="pend-bar" onclick="showScreen('admin')"><i class="fa-solid fa-clock-rotate-left"></i><span><strong>${n} join request${n>1?'s':''}</strong> awaiting your approval</span><i class="fa-solid fa-chevron-right" style="margin-left:auto;font-size:11px;"></i></div>`:'';
}

function evCard(ev){
  const p=past(ev.date);
  const coverUrl=COVERS[ev.cov%COVERS.length];
  const rsvpMs=S.members.filter(m=>(ev.rsvps||[]).includes(m.id));
  const stack=rsvpMs.slice(0,4).map(m=>`<div class="av-sm ac${m.c%5}">${ini(m.name)}</div>`).join('');
  const extra=(ev.rsvps||[]).length-4;
  return`<div class="ev-card" onclick="openEvDetail(${ev.id})">
    <div class="ev-cover">
      <img class="ev-cover-img" src="${coverUrl}" alt="${ev.name}" loading="lazy">
      <div class="ev-cover-grad"></div>
      <div class="ev-cover-top">
        <span class="pill ${p?'p-gray':'p-green'}">${p?'Past':'Upcoming'}</span>
        <div style="display:flex;gap:5px;">
          ${(ev.photos||[]).length>0?`<span class="pill p-blue" style="backdrop-filter:blur(6px);background:rgba(74,158,255,0.25);"><i class="fa-regular fa-image"></i>${ev.photos.length}</span>`:''}
          ${(ev.chat||[]).length>0?`<span class="pill p-blue" style="backdrop-filter:blur(6px);background:rgba(74,158,255,0.25);"><i class="fa-solid fa-comment"></i>${ev.chat.length}</span>`:''}
        </div>
      </div>
      <div class="ev-cover-bot">
        <div class="ev-cover-date"><i class="fa-regular fa-calendar"></i>${fmtShort(ev.date)} &nbsp;&middot;&nbsp; <i class="fa-solid fa-location-dot"></i>${ev.location||'TBD'}</div>
      </div>
    </div>
    <div class="ev-body">
      <div class="ev-title">${ev.name}</div>
      ${ev.desc?`<div class="ev-desc">${ev.desc}</div>`:''}
      <div class="ev-footer">
        <div class="av-stack">
          ${stack}
          ${extra>0?`<div class="av-sm" style="background:var(--bg4);color:var(--text3);font-size:9px;font-family:'DM Sans',sans-serif;">+${extra}</div>`:''}
          <span class="av-count">${(ev.rsvps||[]).length} going</span>
        </div>
        ${(ev.venues||[]).length>0?`<span class="pill p-amber"><i class="fa-solid fa-location-dot"></i>Vote venue</span>`:''}
      </div>
    </div>
  </div>`;
}

function renderHomeEvs(){
  const el=document.getElementById('home-evs');
  const up=S.events.filter(e=>!past(e.date)).slice(0,3);
  el.innerHTML=up.length?up.map(evCard).join(''):'<div class="empty"><i class="fa-regular fa-calendar"></i><p>No upcoming events.<br>Create one!</p></div>';
}
function renderEvList(){
  const el=document.getElementById('events-list');if(!el)return;
  const evs=S.events.filter(e=>evFilter==='upcoming'?!past(e.date):past(e.date));
  el.innerHTML=evs.length?evs.map(evCard).join(''):`<div class="empty"><i class="fa-regular fa-calendar"></i><p>No ${evFilter} events</p></div>`;
}
function filterEvs(f,btn){
  evFilter=f;
  document.querySelectorAll('.tpill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');renderEvList();
}
function renderMembers(){
  const el=document.getElementById('members-list');if(!el)return;
  if(!S.members.length){el.innerHTML='<div class="empty"><i class="fa-solid fa-users"></i><p>No members yet</p></div>';return;}
  el.innerHTML=S.members.map(m=>`
    <div class="mrow">
      <div class="mav ac${m.c%5}" style="width:44px;height:44px;font-size:13px;">${ini(m.name)}</div>
      <div class="minfo"><div class="mname">${m.name}</div><div class="msub">${m.email}</div></div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="pill p-green">Member</span>
        <button class="btn btn-d btn-xs" onclick="removeMember(${m.id},event)"><i class="fa-solid fa-user-minus"></i></button>
      </div>
    </div>`).join('');
}
function renderAdmin(){
  const pel=document.getElementById('pending-list'),ael=document.getElementById('admin-events');
  if(!pel)return;
  const pend=S.requests.filter(r=>r.status==='pending');
  pel.innerHTML=pend.length?pend.map(r=>`<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 16px;margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
      <div><div style="font-size:14px;font-weight:600;color:var(--text);">${r.name}</div><div style="font-size:12px;color:var(--text3);margin-top:2px;">${r.email}</div></div>
      <span class="pill p-amber">Pending</span>
    </div>
    ${r.reason?`<div style="font-size:13px;color:var(--text2);margin-bottom:10px;font-style:italic;background:var(--bg3);padding:8px 12px;border-radius:8px;">"${r.reason}"</div>`:''}
    <div class="btn-row">
      <button class="btn btn-p btn-sm btn-glow" onclick="approveReq(${r.id})"><i class="fa-solid fa-check"></i>Approve</button>
      <button class="btn btn-d btn-sm" onclick="denyReq(${r.id})"><i class="fa-solid fa-xmark"></i>Deny</button>
    </div></div>`).join('')
  :'<div class="empty" style="padding:20px 0;"><i class="fa-solid fa-inbox"></i><p>No pending requests</p></div>';
  if(ael)ael.innerHTML=S.events.length?S.events.map(ev=>`
    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border2);">
      <img src="${COVERS[ev.cov%COVERS.length]}" style="width:48px;height:36px;object-fit:cover;border-radius:8px;flex-shrink:0;" alt="">
      <div style="flex:1;"><div style="font-size:13px;font-weight:500;color:var(--text);">${ev.name}</div><div style="font-size:11px;color:var(--text3);margin-top:2px;">${fmtD(ev.date)}</div></div>
      <button class="btn btn-d btn-xs" onclick="deleteEvent(${ev.id})"><i class="fa-solid fa-trash"></i></button>
    </div>`).join(''):'<div style="font-size:13px;color:var(--text3);padding:10px 0;">No events yet.</div>';
}

function openEvDetail(id){
  curEvId=id;renderEvDetail();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('screen-event-detail').classList.add('on');
  document.getElementById('nav-events').classList.add('on');
}
function renderEvDetail(){
  const ev=S.events.find(e=>e.id===curEvId);if(!ev)return;
  const coverUrl=COVERS[ev.cov%COVERS.length];
  const rsvpMs=S.members.filter(m=>(ev.rsvps||[]).includes(m.id));
  const photos=(ev.photos||[]).map(p=>`<div class="ptile"><img src="${p.url}" alt="photo"></div>`).join('');
  const totalV=(ev.venues||[]).reduce((a,v)=>a+(v.votes||[]).length,0);
  const maxV=Math.max(0,...(ev.venues||[]).map(v=>(v.votes||[]).length));
  const venueHTML=(ev.venues||[]).map(v=>{
    const vc=(v.votes||[]).length,pct=totalV?Math.round(vc/totalV*100):0,lead=vc===maxV&&vc>0;
    return`<div class="vi">
      <div class="vh">
        <span class="vn">${lead?'🏆 ':''}<strong>${v.name}</strong> <span style="font-size:11px;color:var(--text3);">${v.addr||''}</span></span>
        <div style="display:flex;align-items:center;gap:8px;"><span class="vc">${vc} vote${vc!==1?'s':''}</span>
        <button class="btn btn-p btn-xs" onclick="voteVenue(${ev.id},${v.id})">Vote</button></div>
      </div>
      <div class="vbg"><div class="vb" style="width:${pct}%;"></div></div>
    </div>`;
  }).join('');
  const chatHTML=(ev.chat||[]).map(msg=>{
    const m=gm(msg.mid);const c=(m?m.c:0)%5;
    return`<div class="cmr"><div class="cmav ac${c}">${ini(msg.name)}</div>
      <div><div class="bbl bbl-in">${msg.text}</div><div class="bmeta">${msg.name} · ${fmtT(msg.t)}</div></div>
    </div>`;
  }).join('')||`<div style="text-align:center;padding:18px;font-size:13px;color:var(--text3);">No messages yet. Start the convo! 💬</div>`;

  document.getElementById('ev-detail').innerHTML=`
    <div style="height:220px;position:relative;overflow:hidden;">
      <img src="${coverUrl}" style="width:100%;height:100%;object-fit:cover;object-position:center;" alt="${ev.name}">
      <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(0,0,0,0.82) 100%);"></div>
      <button class="btn btn-g btn-sm" style="position:absolute;top:14px;left:14px;backdrop-filter:blur(8px);background:rgba(0,0,0,0.35);border-color:rgba(255,255,255,0.2);color:#fff;" onclick="showScreen('events')"><i class="fa-solid fa-arrow-left"></i>Back</button>
      <div style="position:absolute;bottom:16px;left:18px;right:18px;">
        <span class="pill ${past(ev.date)?'p-gray':'p-green'}" style="margin-bottom:8px;display:inline-flex;">${past(ev.date)?'Past':'Upcoming'}</span>
        <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,0.5);">${ev.name}</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.75);margin-top:6px;display:flex;gap:14px;">
          <span><i class="fa-regular fa-calendar" style="margin-right:4px;"></i>${fmtD(ev.date)}</span>
          <span><i class="fa-solid fa-location-dot" style="margin-right:4px;"></i>${ev.location||'TBD'}</span>
        </div>
      </div>
    </div>
    <div class="pad">
      ${ev.desc?`<div style="font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:18px;padding:14px 16px;background:var(--bg3);border-radius:12px;">${ev.desc}</div>`:''}
      <button class="btn btn-p btn-glow btn-block" style="margin-bottom:20px;" onclick="rsvpEv(${ev.id})"><i class="fa-solid fa-check"></i>I'm going!</button>

      <div class="slbl">Going (${(ev.rsvps||[]).length}) <div class="slbl-line"></div></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;">
        ${rsvpMs.length?rsvpMs.map(m=>`
          <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
            <div class="mav ac${m.c%5}" style="width:46px;height:46px;font-size:14px;">${ini(m.name)}</div>
            <span style="font-size:11px;color:var(--text2);">${m.name.split(' ')[0]}</span>
          </div>`).join('')
        :'<span style="font-size:13px;color:var(--text3);">No RSVPs yet — be the first!</span>'}
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="slbl" style="margin:0;flex:1;">Venue voting <div class="slbl-line"></div></div>
        <button class="btn btn-g btn-sm" style="margin-left:10px;" onclick="openM('m-venue')"><i class="fa-solid fa-plus"></i>Suggest</button>
      </div>
      <div class="sbox">
        ${venueHTML||'<div style="text-align:center;font-size:13px;color:var(--text3);padding:8px 0;">No venues yet. Suggest one! 📍</div>'}
      </div>

      <div class="slbl">Photos (${(ev.photos||[]).length}) <div class="slbl-line"></div></div>
      ${photos?`<div class="photo-grid" style="margin-bottom:10px;">${photos}</div>`:''}
      <label class="upload-zone" for="ph-up-${ev.id}"><i class="fa-solid fa-camera-retro"></i>Upload photos from this meetup</label>
      <input type="file" id="ph-up-${ev.id}" accept="image/*" multiple style="display:none;" onchange="uploadPhotos(${ev.id},this)">

      <div class="slbl" style="margin-top:22px;">Group chat (${(ev.chat||[]).length}) <div class="slbl-line"></div></div>
      <div class="sbox">
        <div class="cmsgs" id="cmsgs">${chatHTML}</div>
        <div class="ci-row">
          <input class="ci" id="ci" placeholder="Say something..." onkeydown="if(event.key==='Enter')sendChat(${ev.id})">
          <button class="cs" onclick="sendChat(${ev.id})"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </div>
    </div>`;
  const c=document.getElementById('cmsgs');if(c)c.scrollTop=c.scrollHeight;
}

function createEvent(){
  const name=document.getElementById('ev-name').value.trim(),date=document.getElementById('ev-date').value;
  if(!name||!date){toast('Please fill in name and date','triangle-exclamation');return;}
  S.events.push({id:uid(),name,date,location:document.getElementById('ev-loc').value.trim(),
    desc:document.getElementById('ev-desc').value.trim(),rsvps:[],photos:[],
    cov:Math.floor(Math.random()*COVERS.length),venues:[],chat:[]});
  save();closeM('m-create');['ev-name','ev-date','ev-loc','ev-desc'].forEach(i=>document.getElementById(i).value='');
  toast('Event created! 🎉');render();
}
function deleteEvent(id){
  if(!confirm('Delete this event?'))return;
  S.events=S.events.filter(e=>e.id!==id);save();toast('Event deleted','trash');render();
}
function rsvpEv(id){
  const ev=S.events.find(e=>e.id===id);if(!ev)return;
  if(!ev.rsvps.includes(0))ev.rsvps.push(0);
  save();toast('RSVP confirmed! ✅');
  if(curEvId===id)renderEvDetail();render();
}
function removeMember(id,e){
  e.stopPropagation();
  const m=S.members.find(x=>x.id===id);if(!m)return;
  if(!confirm(`Remove ${m.name} from the group?`))return;
  S.members=S.members.filter(x=>x.id!==id);
  S.events.forEach(ev=>{ev.rsvps=(ev.rsvps||[]).filter(r=>r!==id);});
  save();toast(`${m.name} removed`,'user-minus');render();
}
function addVenue(){
  const name=document.getElementById('vn-name').value.trim();
  if(!name){toast('Enter a venue name','triangle-exclamation');return;}
  const ev=S.events.find(e=>e.id===curEvId);if(!ev)return;
  if(!ev.venues)ev.venues=[];
  ev.venues.push({id:uid(),name,addr:document.getElementById('vn-addr').value.trim(),votes:[]});
  save();closeM('m-venue');
  document.getElementById('vn-name').value='';document.getElementById('vn-addr').value='';
  toast('Venue added! 📍');renderEvDetail();
}
function voteVenue(evId,vId){
  const ev=S.events.find(e=>e.id===evId);if(!ev)return;
  const v=ev.venues.find(x=>x.id===vId);if(!v)return;
  if(!v.votes)v.votes=[];
  if(v.votes.includes(0)){toast('Already voted!','info');return;}
  v.votes.push(0);save();toast('Vote cast! 🗳️');renderEvDetail();
}
function sendChat(evId){
  const inp=document.getElementById('ci'),text=inp.value.trim();if(!text)return;
  const ev=S.events.find(e=>e.id===evId);if(!ev)return;
  if(!ev.chat)ev.chat=[];
  ev.chat.push({id:uid(),mid:0,name:'You',text,t:Date.now()});
  inp.value='';save();renderEvDetail();
}
async function uploadPhotos(evId,input){
  const ev=S.events.find(e=>e.id===evId);if(!ev)return;
  if(!ev.photos)ev.photos=[];
  for(const f of Array.from(input.files)){
    const url=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f);});
    ev.photos.push({url,name:f.name,uploaded:Date.now()});
  }
  save();toast(input.files.length+' photo'+(input.files.length>1?'s':'')+' uploaded! 📸');
  renderEvDetail();render();
}
function submitJoin(){
  const name=document.getElementById('jn-name').value.trim(),email=document.getElementById('jn-email').value.trim();
  if(!name||!email){toast('Fill in name and email','triangle-exclamation');return;}
  S.requests.push({id:uid(),name,email,reason:document.getElementById('jn-reason').value.trim(),status:'pending',submitted:Date.now()});
  save();closeM('m-join');['jn-name','jn-email','jn-reason'].forEach(i=>document.getElementById(i).value='');
  toast('Request submitted! 🙌');render();
}
function approveReq(id){
  const r=S.requests.find(x=>x.id===id);if(!r)return;
  r.status='approved';
  S.members.push({id:uid(),name:r.name,email:r.email,c:S.members.length%5,joined:Date.now()});
  save();toast(r.name+' approved! 🎉');render();
}
function denyReq(id){
  const r=S.requests.find(x=>x.id===id);if(!r)return;
  r.status='denied';save();toast('Request denied');render();
}

load();
</script>
</body>
</html>
