<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMV Friends</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #085041;
    --green-mid: #0F6E56;
    --bg: #f8f9fa;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --text-secondary: #6b7280;
    --text-tertiary: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 640px; margin: 0 auto; background: var(--card); min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,0.08); }
  .topbar { background: var(--green); color: #fff; padding: 16px 20px 18px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-left h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .topbar-left p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.4); }
  .av-teal { background: #9FE1CB; color: #085041; }
  .av-blue { background: #B5D4F4; color: #0C447C; }
  .av-coral { background: #F5C4B3; color: #712B13; }
  .av-purple { background: #CECBF6; color: #3C3489; }
  .av-amber { background: #FAC775; color: #633806; }
  .pending-chip { background: #fff; color: var(--green); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; display: none; margin-right: 8px; }
  .nav { display: flex; border-bottom: 1px solid var(--border); background: #fff; position: sticky; top: 0; z-index: 10; }
  .nav-btn { flex: 1; padding: 12px 4px 10px; font-size: 11px; border: none; background: transparent; cursor: pointer; color: var(--text-secondary); display: flex; flex-direction: column; align-items: center; gap: 4px; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .nav-btn i { font-size: 17px; }
  .nav-btn.active { color: var(--green); border-bottom-color: var(--green); }
  .screen { padding: 16px; display: none; }
  .screen.active { display: block; }
  .toast { background: var(--green); color: #fff; border-radius: 8px; padding: 10px 16px; font-size: 13px; margin: 12px 16px 0; display: none; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; }
  .stat { background: var(--green-light); border-radius: 10px; padding: 14px 10px; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 700; color: var(--green-dark); }
  .stat-lbl { font-size: 11px; color: var(--green-mid); margin-top: 2px; font-weight: 500; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; margin-top: 4px; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .card-body { padding: 14px 16px; }
  .card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
  .card-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 10px; border-radius: 999px; }
  .badge-green { background: #E1F5EE; color: #0F6E56; }
  .badge-amber { background: #FAEEDA; color: #854F0B; }
  .badge-gray { background: #f3f4f6; color: #6b7280; }
  .badge-red { background: #FEE2E2; color: #991B1B; }
  .btn { border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.88; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-secondary { background: #f3f4f6; color: var(--text); }
  .btn-danger { background: #FEE2E2; color: #991B1B; }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-block { width: 100%; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; font-size: 13px; border-radius: 8px; padding: 9px 12px; border: 1px solid var(--border); background: #fff; color: var(--text); outline: none; transition: border 0.15s; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--green); }
  .form-group textarea { min-height: 72px; resize: vertical; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 100; display: none; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 22px; width: 100%; max-width: 420px; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .modal-title i { color: var(--green); }
  .photo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; margin-top: 8px; }
  .photo-tile { aspect-ratio: 1; border-radius: 6px; overflow: hidden; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-tertiary); cursor: pointer; }
  .photo-tile img { width: 100%; height: 100%; object-fit: cover; }
  .upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; color: var(--text-secondary); font-size: 13px; margin-top: 10px; transition: border-color 0.15s; }
  .upload-zone:hover { border-color: var(--green); color: var(--green); }
  .upload-zone i { font-size: 26px; display: block; margin-bottom: 6px; color: var(--green); }
  .member-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .member-row:last-child { border-bottom: none; }
  .member-info { flex: 1; }
  .member-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .member-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .tab-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab-pill { font-size: 12px; padding: 5px 14px; border-radius: 999px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; }
  .tab-pill.active { background: var(--green); color: #fff; border-color: var(--green); }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 13px; }
  .empty i { font-size: 32px; display: block; margin-bottom: 10px; opacity: 0.3; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .admin-event-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .admin-event-row:last-child { border-bottom: none; }
  .event-detail-header { background: var(--green); color: #fff; padding: 14px 16px 18px; margin: -16px -16px 16px; }
  .back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; opacity: 0.85; cursor: pointer; margin-bottom: 10px; background: none; border: none; color: #fff; padding: 0; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <p>Welcome back, Admin 👋</p>
      <h1>DMV Friends</h1>
    </div>
    <div style="display:flex;align-items:center;">
      <span class="pending-chip" id="pending-chip"></span>
      <div class="avatar av-teal">AD</div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" id="nav-home" onclick="showScreen('home')"><i class="fa-solid fa-house"></i>Home</button>
    <button class="nav-btn" id="nav-events" onclick="showScreen('events')"><i class="fa-solid fa-calendar-days"></i>Events</button>
    <button class="nav-btn" id="nav-members" onclick="showScreen('members')"><i class="fa-solid fa-users"></i>Members</button>
    <button class="nav-btn" id="nav-admin" onclick="showScreen('admin')"><i class="fa-solid fa-shield-halved"></i>Admin</button>
  </div>

  <div id="toast" class="toast"></div>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="stat-row">
      <div class="stat"><div class="stat-val" id="s-members">0</div><div class="stat-lbl">Members</div></div>
      <div class="stat"><div class="stat-val" id="s-events">0</div><div class="stat-lbl">Events</div></div>
      <div class="stat"><div class="stat-val" id="s-photos">0</div><div class="stat-lbl">Photos</div></div>
    </div>
    <div class="section-label">Upcoming events</div>
    <div id="home-events"></div>
    <div class="section-label" style="margin-top:18px;">Recent photos</div>
    <div class="photo-grid" id="home-photos"></div>
  </div>

  <!-- EVENTS -->
  <div id="screen-events" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div class="tab-row" style="margin:0;">
        <button class="tab-pill active" onclick="filterEvents('upcoming',this)">Upcoming</button>
        <button class="tab-pill" onclick="filterEvents('past',this)">Past</button>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openModal('modal-create-event')"><i class="fa-solid fa-plus" style="margin-right:4px;font-size:11px;"></i>New event</button>
    </div>
    <div id="events-list"></div>
  </div>

  <!-- MEMBERS -->
  <div id="screen-members" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div class="section-label" style="margin:0;">Approved members</div>
      <button class="btn btn-secondary btn-sm" onclick="openModal('modal-join')"><i class="fa-solid fa-user-plus" style="margin-right:4px;font-size:11px;"></i>Request to join</button>
    </div>
    <div id="members-list"></div>
  </div>

  <!-- ADMIN -->
  <div id="screen-admin" class="screen">
    <div class="section-label">Pending join requests</div>
    <div id="pending-list"></div>
    <div class="divider"></div>
    <div class="section-label">Manage events</div>
    <div id="admin-events"></div>
  </div>

  <!-- EVENT DETAIL -->
  <div id="screen-event-detail" class="screen">
    <div id="event-detail-content"></div>
  </div>
</div>

<!-- MODAL: Create Event -->
<div class="modal-overlay" id="modal-create-event">
  <div class="modal">
    <div class="modal-title"><i class="fa-solid fa-calendar-plus"></i>Create new event</div>
    <div class="form-group"><label>Event name *</label><input type="text" id="ev-name" placeholder="e.g. Summer cookout"></div>
    <div class="form-group"><label>Date & time *</label><input type="datetime-local" id="ev-date"></div>
    <div class="form-group"><label>Location</label><input type="text" id="ev-loc" placeholder="e.g. Reston Town Center"></div>
    <div class="form-group"><label>Description</label><textarea id="ev-desc" placeholder="What's the plan?"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-primary" style="flex:1;" onclick="createEvent()">Create event</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-create-event')">Cancel</button>
    </div>
  </div>
</div>

<!-- MODAL: Join Request -->
<div class="modal-overlay" id="modal-join">
  <div class="modal">
    <div class="modal-title"><i class="fa-solid fa-user-plus"></i>Request to join</div>
    <div class="form-group"><label>Your name *</label><input type="text" id="join-name" placeholder="Full name"></div>
    <div class="form-group"><label>Your email *</label><input type="email" id="join-email" placeholder="you@email.com"></div>
    <div class="form-group"><label>Why do you want to join?</label><textarea id="join-reason" placeholder="Tell us about yourself..."></textarea></div>
    <div class="btn-row">
      <button class="btn btn-primary" style="flex:1;" onclick="submitJoin()">Submit request</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-join')">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
const STORAGE_KEY = 'dmvfriends_v2';
let state = { members: [], events: [], requests: [], nextId: 100 };
let eventFilter = 'upcoming';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  if (!state.members || !state.members.length) seedData();
  render();
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function seedData() {
  state.members = [
    { id: 1, name: 'Marcus Johnson', email: 'marcus@dmv.com', color: 'av-teal', joined: Date.now() - 864e5*10 },
    { id: 2, name: 'Tiana Rivers',   email: 'tiana@dmv.com',  color: 'av-blue',  joined: Date.now() - 864e5*8 },
    { id: 3, name: 'Amir Saleh',     email: 'amir@dmv.com',   color: 'av-coral', joined: Date.now() - 864e5*5 },
  ];
  state.events = [
    { id: 1, name: 'Saturday cookout', date: '2026-05-17T15:00', location: 'Reston Town Center', desc: 'Annual summer cookout! Bring something to grill.', rsvps: [1, 2, 3], photos: [] },
    { id: 2, name: 'Movie night',      date: '2026-05-24T19:00', location: 'Alamo Drafthouse',   desc: 'Blockbuster night out, dinner included.',        rsvps: [1],       photos: [] },
  ];
  state.requests = [];
  state.nextId = 200;
  saveState();
}

// ─── Helpers ─────────────────────────────────────────────
const COLORS = ['av-teal','av-blue','av-coral','av-purple','av-amber'];
function avatarColor(i) { return COLORS[i % COLORS.length]; }
function initials(name) { return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }
function fmtDate(iso) {
  if (!iso) return 'TBD';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }) +
         ' · ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}
function isPast(iso) { return new Date(iso) < new Date(); }
function uid() { return ++state.nextId; }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ─── Navigation ──────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  const nb = document.getElementById('nav-' + name);
  if (nb) nb.classList.add('active');
  render();
}

// ─── Render ──────────────────────────────────────────────
function render() {
  renderStats();
  renderHomeEvents();
  renderHomePhotos();
  renderEventsList();
  renderMembersList();
  renderAdminPanel();
  renderPendingBadge();
}

function renderStats() {
  document.getElementById('s-members').textContent = state.members.length;
  document.getElementById('s-events').textContent  = state.events.length;
  const totalPhotos = state.events.reduce((a, e) => a + (e.photos ? e.photos.length : 0), 0);
  document.getElementById('s-photos').textContent  = totalPhotos;
}

function renderPendingBadge() {
  const n = state.requests.filter(r => r.status === 'pending').length;
  const chip = document.getElementById('pending-chip');
  chip.style.display = n > 0 ? '' : 'none';
  chip.textContent = n + ' pending';
}

function eventCardHTML(ev, compact) {
  const past = isPast(ev.date);
  const rsvpCount = (ev.rsvps || []).length;
  const photoCount = (ev.photos || []).length;
  return `<div class="card">
    <div class="card-body">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
        <div class="card-title">${ev.name}</div>
        <span class="badge ${past ? 'badge-gray' : 'badge-green'}">${past ? 'Past' : 'Upcoming'}</span>
      </div>
      <div class="card-meta">
        <span><i class="fa-regular fa-calendar" style="color:var(--green);font-size:11px;"></i>${fmtDate(ev.date)}</span>
        <span><i class="fa-solid fa-location-dot" style="color:var(--green);font-size:11px;"></i>${ev.location || 'TBD'}</span>
      </div>
      <div style="display:flex;gap:12px;font-size:12px;color:var(--text-secondary);margin-bottom:10px;">
        <span><i class="fa-solid fa-users" style="font-size:11px;margin-right:3px;"></i>${rsvpCount} going</span>
        <span><i class="fa-regular fa-image" style="font-size:11px;margin-right:3px;"></i>${photoCount} photos</span>
      </div>
      <div class="btn-row" style="margin-top:0;">
        <button class="btn btn-primary btn-sm" onclick="rsvpEvent(${ev.id})"><i class="fa-solid fa-check" style="font-size:11px;margin-right:4px;"></i>Going</button>
        <button class="btn btn-secondary btn-sm" onclick="openEventDetail(${ev.id})"><i class="fa-regular fa-image" style="font-size:11px;margin-right:4px;"></i>Photos & details</button>
      </div>
    </div>
  </div>`;
}

function renderHomeEvents() {
  const el = document.getElementById('home-events');
  const upcoming = state.events.filter(e => !isPast(e.date)).slice(0, 2);
  if (!upcoming.length) { el.innerHTML = '<div class="empty"><i class="fa-regular fa-calendar"></i>No upcoming events yet</div>'; return; }
  el.innerHTML = upcoming.map(ev => eventCardHTML(ev, true)).join('');
}

function renderHomePhotos() {
  const el = document.getElementById('home-photos');
  const all = [];
  state.events.forEach(e => { if (e.photos) e.photos.forEach(p => all.push(p)); });
  if (!all.length) {
    el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:24px 0;font-size:13px;color:var(--text-secondary);">No photos yet — upload some after your first meetup!</div>';
    return;
  }
  el.innerHTML = all.slice(-6).map(p => `<div class="photo-tile"><img src="${p.url}" alt="event photo"></div>`).join('');
}

function renderEventsList() {
  const el = document.getElementById('events-list');
  if (!el) return;
  const evs = state.events.filter(e => eventFilter === 'upcoming' ? !isPast(e.date) : isPast(e.date));
  if (!evs.length) { el.innerHTML = `<div class="empty"><i class="fa-regular fa-calendar"></i>No ${eventFilter} events</div>`; return; }
  el.innerHTML = evs.map(ev => eventCardHTML(ev, false)).join('');
}

function filterEvents(f, btn) {
  eventFilter = f;
  document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEventsList();
}

function renderMembersList() {
  const el = document.getElementById('members-list');
  if (!el) return;
  if (!state.members.length) { el.innerHTML = '<div class="empty"><i class="fa-solid fa-users"></i>No members yet</div>'; return; }
  el.innerHTML = state.members.map((m, i) => `
    <div class="member-row">
      <div class="avatar ${m.color || avatarColor(i)}">${initials(m.name)}</div>
      <div class="member-info">
        <div class="member-name">${m.name}</div>
        <div class="member-sub">${m.email}</div>
      </div>
      <span class="badge badge-green">Member</span>
    </div>
  `).join('');
}

function renderAdminPanel() {
  const pel = document.getElementById('pending-list');
  const ael = document.getElementById('admin-events');
  if (!pel) return;
  const pending = state.requests.filter(r => r.status === 'pending');
  if (!pending.length) {
    pel.innerHTML = '<div class="empty" style="padding:20px 0;"><i class="fa-solid fa-inbox"></i>No pending requests</div>';
  } else {
    pel.innerHTML = pending.map(r => `
      <div class="card"><div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
          <div><div class="card-title">${r.name}</div><div style="font-size:12px;color:var(--text-secondary);">${r.email}</div></div>
          <span class="badge badge-amber">Pending</span>
        </div>
        ${r.reason ? `<div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;font-style:italic;">"${r.reason}"</div>` : ''}
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="approveRequest(${r.id})"><i class="fa-solid fa-check" style="font-size:11px;margin-right:4px;"></i>Approve</button>
          <button class="btn btn-danger btn-sm" onclick="denyRequest(${r.id})"><i class="fa-solid fa-x" style="font-size:11px;margin-right:4px;"></i>Deny</button>
        </div>
      </div></div>
    `).join('');
  }
  if (ael) {
    ael.innerHTML = state.events.map(ev => `
      <div class="admin-event-row">
        <div>
          <div style="font-size:13px;font-weight:500;">${ev.name}</div>
          <div style="font-size:11px;color:var(--text-secondary);">${fmtDate(ev.date)}</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteEvent(${ev.id})"><i class="fa-solid fa-trash" style="font-size:11px;"></i></button>
      </div>
    `).join('') || '<div style="font-size:13px;color:var(--text-secondary);padding:10px 0;">No events yet.</div>';
  }
}

// ─── Event actions ────────────────────────────────────────
function createEvent() {
  const name = document.getElementById('ev-name').value.trim();
  const date = document.getElementById('ev-date').value;
  const loc  = document.getElementById('ev-loc').value.trim();
  const desc = document.getElementById('ev-desc').value.trim();
  if (!name || !date) { toast('Please fill in name and date'); return; }
  state.events.push({ id: uid(), name, date, location: loc, desc, rsvps: [], photos: [] });
  saveState(); closeModal('modal-create-event');
  document.getElementById('ev-name').value = '';
  document.getElementById('ev-date').value = '';
  document.getElementById('ev-loc').value  = '';
  document.getElementById('ev-desc').value = '';
  toast('Event created! 🎉'); render();
}

function deleteEvent(id) {
  if (!confirm('Delete this event?')) return;
  state.events = state.events.filter(e => e.id !== id);
  saveState(); toast('Event deleted'); render();
}

function rsvpEvent(id) {
  const ev = state.events.find(e => e.id === id);
  if (!ev) return;
  if (!ev.rsvps.includes(0)) ev.rsvps.push(0);
  saveState(); toast('RSVP confirmed! ✅'); render();
}

function openEventDetail(id) {
  const ev = state.events.find(e => e.id === id);
  if (!ev) return;
  const members = state.members.filter(m => ev.rsvps.includes(m.id));
  const photos  = (ev.photos || []).map(p => `<div class="photo-tile"><img src="${p.url}" alt="photo"></div>`).join('');
  document.getElementById('event-detail-content').innerHTML = `
    <div class="event-detail-header">
      <button class="back-btn" onclick="showScreen('events')"><i class="fa-solid fa-arrow-left" style="font-size:13px;"></i> Back to events</button>
      <div style="font-size:20px;font-weight:600;margin-bottom:2px;">${ev.name}</div>
      <div style="font-size:12px;opacity:0.85;">${fmtDate(ev.date)} · ${ev.location || 'TBD'}</div>
    </div>
    ${ev.desc ? `<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;line-height:1.6;">${ev.desc}</div>` : ''}
    <div class="section-label">Going (${ev.rsvps.length})</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
      ${members.length ? members.map((m,i) => `
        <div style="display:flex;align-items:center;gap:5px;background:#f3f4f6;border-radius:999px;padding:4px 12px 4px 5px;">
          <div class="avatar ${m.color || avatarColor(i)}" style="width:24px;height:24px;font-size:9px;">${initials(m.name)}</div>
          <span style="font-size:12px;">${m.name.split(' ')[0]}</span>
        </div>
      `).join('') : '<span style="font-size:13px;color:var(--text-secondary);">No RSVPs yet</span>'}
    </div>
    <div class="section-label">Photos (${(ev.photos||[]).length})</div>
    <div class="photo-grid">${photos}</div>
    <label class="upload-zone" for="photo-upload-${id}">
      <i class="fa-solid fa-camera-retro"></i>
      Tap to upload photos from this meetup
    </label>
    <input type="file" id="photo-upload-${id}" accept="image/*" multiple style="display:none;" onchange="uploadPhotos(${id},this)">
    <button class="btn btn-primary btn-block" style="margin-top:12px;" onclick="rsvpEvent(${id})">
      <i class="fa-solid fa-check" style="margin-right:6px;font-size:12px;"></i>I'm going!
    </button>
  `;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-event-detail').classList.add('active');
}

async function uploadPhotos(evId, input) {
  const ev = state.events.find(e => e.id === evId);
  if (!ev) return;
  if (!ev.photos) ev.photos = [];
  const files = Array.from(input.files);
  for (const f of files) {
    const url = await new Promise(res => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.readAsDataURL(f);
    });
    ev.photos.push({ url, name: f.name, uploaded: Date.now() });
  }
  saveState();
  toast(files.length + ' photo' + (files.length > 1 ? 's' : '') + ' uploaded! 📸');
  openEventDetail(evId);
}

// ─── Join / Member actions ────────────────────────────────
function submitJoin() {
  const name   = document.getElementById('join-name').value.trim();
  const email  = document.getElementById('join-email').value.trim();
  const reason = document.getElementById('join-reason').value.trim();
  if (!name || !email) { toast('Please fill in name and email'); return; }
  state.requests.push({ id: uid(), name, email, reason, status: 'pending', submitted: Date.now() });
  saveState(); closeModal('modal-join');
  document.getElementById('join-name').value   = '';
  document.getElementById('join-email').value  = '';
  document.getElementById('join-reason').value = '';
  toast('Request submitted! Awaiting admin approval 🙌');
  render();
}

function approveRequest(id) {
  const req = state.requests.find(r => r.id === id);
  if (!req) return;
  req.status = 'approved';
  state.members.push({ id: uid(), name: req.name, email: req.email, color: avatarColor(state.members.length), joined: Date.now() });
  saveState(); toast(req.name + ' approved and added! ✅'); render();
}

function denyRequest(id) {
  const req = state.requests.find(r => r.id === id);
  if (!req) return;
  req.status = 'denied';
  saveState(); toast('Request denied.'); render();
}

// ─── Boot ─────────────────────────────────────────────────
loadState();
</script>
</body>
</html>
